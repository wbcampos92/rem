<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cálculo Remoção SGP</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
/* ── Design System ── */
:root {
    --g: #BF8C14; --g-d: #9E720F; --g-l: #DDB84A; --g-pl: #F5E9C4; --g-pale: #FDF8EE;
    --n: #0A1C30; --n2: #12273F; --n3: #1A324E;
    --bg: #EBEBDF; --sf: #FFFFFF; --sf2: #F5F4EE; --sf3: #EEEEE5;
    --bd: #E0DDCF; --bd2: #D3CFBE; --bd3: #C5C0AC;
    --t: #0A1C30; --t2: #374E68; --t3: #7086A0; --t4: #A8BAD0;
    --ok: #166534; --ok-bg: #DCFCE7; --ok-bd: #BBF7D0;
    --er: #991B1B; --er-bg: #FEE8E8; --er-bd: #FECACA;
    --am: #92400E; --am-bg: #FEF3C7; --am-bd: #FDE68A;
    --sh-sm: 0 1px 4px rgba(10,28,48,.07),0 0 1px rgba(10,28,48,.04);
    --sh: 0 4px 18px rgba(10,28,48,.09),0 1px 4px rgba(10,28,48,.05);
    --r: 10px; --r6: 6px; --r14: 14px;
    --ff: 'Outfit', system-ui, sans-serif;
    --fs: 'DM Serif Display', serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body {
    font-family: var(--ff);
    background: var(--bg);
    color: var(--t);
    -webkit-font-smoothing: antialiased;
    font-size: 14px;
    line-height: 1.5;
    padding: 20px;
    max-width: 900px;
    margin: 0 auto;
}

/* ── Componentes ── */
.app { display: flex; flex-direction: column; gap: 16px; }

.ptitle {
    font-size: 22px;
    font-weight: 800;
    color: var(--t);
    letter-spacing: -0.025em;
    line-height: 1.15;
}
.psubt {
    font-size: 12px;
    color: var(--t3);
    margin-bottom: 24px;
    font-weight: 400;
}

.norm {
    background: var(--g-pale);
    border-radius: var(--r);
    border: 1px solid var(--g-pl);
    border-left: 4px solid var(--g);
    padding: 14px 20px;
    margin-bottom: 22px;
    position: relative;
    overflow: hidden;
}
.norm-t {
    font-size: 9.5px;
    font-weight: 800;
    color: var(--g-d);
    text-transform: uppercase;
    letter-spacing: .14em;
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 7px;
}
.norm-b {
    font-size: 12px;
    color: var(--t2);
    line-height: 1.8;
}
.norm-b strong { color: var(--t); font-weight: 700; }

.card {
    background: var(--sf);
    border-radius: var(--r);
    padding: 20px 24px;
    margin-bottom: 16px;
    box-shadow: var(--sh-sm);
    border: 1px solid var(--bd);
}
.cht {
    font-size: 14.5px;
    font-weight: 700;
    color: var(--t);
    margin-bottom: 18px;
    letter-spacing: -0.02em;
    display: flex;
    align-items: center;
    gap: 9px;
}
.cht::before {
    content: '';
    width: 3px;
    height: 16px;
    background: var(--g);
    border-radius: 2px;
    flex-shrink: 0;
}

.g2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.g3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }
.mt10 { margin-top: 10px; }
.mt12 { margin-top: 12px; }
.mt14 { margin-top: 14px; }

.fl { display: flex; flex-direction: column; gap: 5px; }
.fl label {
    font-size: 10px;
    font-weight: 700;
    color: var(--t3);
    text-transform: uppercase;
    letter-spacing: .12em;
}
.fl input[type="text"],
.fl input[type="date"],
.fl input[type="number"],
.fl select,
.fl textarea {
    padding: 9px 13px;
    border: 1.5px solid var(--bd2);
    border-radius: var(--r6);
    font-size: 13px;
    font-family: var(--ff);
    font-weight: 500;
    color: var(--t);
    background: var(--sf);
    width: 100%;
    transition: border-color .14s, box-shadow .14s;
}
.fl input:focus,
.fl select:focus,
.fl textarea:focus {
    outline: none;
    border-color: var(--g);
    box-shadow: 0 0 0 3px rgba(191,140,20,.1);
}
.fl textarea { resize: vertical; line-height: 1.5; }
.hint {
    font-size: 11px;
    color: var(--t4);
    margin-top: 3px;
    line-height: 1.5;
    font-weight: 400;
}

.btn {
    padding: 10px 22px;
    border-radius: var(--r6);
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    border: none;
    transition: all .15s ease;
    font-family: var(--ff);
    letter-spacing: .01em;
    display: inline-flex;
    align-items: center;
    gap: 7px;
}
.b-g {
    background: linear-gradient(135deg, #1F7A32, var(--ok));
    color: #fff;
    box-shadow: 0 2px 10px rgba(22,101,52,.22);
}
.b-g:hover { filter: brightness(1.08); transform: translateY(-1px); }
.b-s {
    background: var(--sf);
    color: var(--t2);
    border: 1.5px solid var(--bd2);
}
.b-s:hover { border-color: var(--g); color: var(--g); }
.b-sm { padding: 6px 13px; font-size: 12px; }
.brow {
    display: flex;
    gap: 8px;
    margin-top: 16px;
    margin-bottom: 16px;
    align-items: center;
    flex-wrap: wrap;
}

.ok-box {
    background: var(--ok-bg);
    border: 1px solid var(--ok-bd);
    border-radius: var(--r6);
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 12px;
}
.ok-dot {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: var(--ok);
    color: #fff;
    font-size: 12px;
    font-weight: 800;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
}
.err-box {
    background: var(--am-bg);
    border: 1px solid var(--am-bd);
    border-radius: var(--r6);
    padding: 10px 15px;
    margin-top: 10px;
    font-size: 12.5px;
    color: var(--am);
    font-weight: 500;
}

/* ── Estilos específicos ── */
.remocao-status {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 16px 20px;
    border-radius: var(--r);
    margin-top: 12px;
    border: 1.5px solid var(--bd);
    background: var(--sf);
}
.remocao-status .dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    flex-shrink: 0;
}
.remocao-status .dot.verde { background: #22C55E; }
.remocao-status .dot.amarelo { background: #EAB308; }
.remocao-status .dot.vermelho { background: #EF4444; }
.remocao-status .dot.azul { background: #3B82F6; }
.remocao-status .dot.roxo { background: #8B5CF6; }

.remocao-timeline {
    margin: 16px 0;
    padding: 16px 20px;
    background: var(--sf2);
    border-radius: var(--r);
    border: 1px solid var(--bd);
    position: relative;
}
.remocao-timeline::before {
    content: '';
    position: absolute;
    left: 28px;
    top: 32px;
    bottom: 32px;
    width: 2px;
    background: var(--bd2);
}
.remocao-timeline .evento {
    display: flex;
    align-items: flex-start;
    gap: 16px;
    padding: 8px 0;
    position: relative;
}
.remocao-timeline .evento .marcador {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 700;
    color: #fff;
    flex-shrink: 0;
    z-index: 1;
}
.remocao-timeline .evento .marcador.verde { background: #22C55E; }
.remocao-timeline .evento .marcador.amarelo { background: #EAB308; }
.remocao-timeline .evento .marcador.vermelho { background: #EF4444; }
.remocao-timeline .evento .marcador.azul { background: #3B82F6; }
.remocao-timeline .evento .marcador.roxo { background: #8B5CF6; }
.remocao-timeline .evento .conteudo { flex: 1; padding-top: 2px; }
.remocao-timeline .evento .conteudo .data {
    font-size: 13px;
    font-weight: 700;
    color: var(--t);
}
.remocao-timeline .evento .conteudo .desc {
    font-size: 12px;
    color: var(--t2);
    margin-top: 2px;
}
.remocao-timeline .evento .conteudo .dias {
    font-size: 11px;
    color: var(--t3);
    margin-top: 1px;
}

.remocao-resumo-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 12px;
    margin: 12px 0;
}
.remocao-resumo-grid .item {
    background: var(--sf);
    border: 1px solid var(--bd);
    border-radius: var(--r6);
    padding: 14px 16px;
    text-align: center;
}
.remocao-resumo-grid .item .label {
    font-size: 10px;
    font-weight: 700;
    color: var(--t3);
    text-transform: uppercase;
    letter-spacing: .06em;
}
.remocao-resumo-grid .item .valor {
    font-size: 18px;
    font-weight: 700;
    color: var(--t);
    margin-top: 4px;
    font-family: var(--ff);
}
.remocao-resumo-grid .item .valor.verde { color: #22C55E; }
.remocao-resumo-grid .item .valor.vermelho { color: #EF4444; }
.remocao-resumo-grid .item .valor.amarelo { color: #EAB308; }
.remocao-resumo-grid .item .valor.azul { color: #3B82F6; }
.remocao-resumo-grid .item .valor.roxo { color: #8B5CF6; }

.remocao-afastamento-info {
    background: var(--am-bg);
    border: 1px solid var(--am-bd);
    border-radius: var(--r6);
    padding: 12px 16px;
    margin: 10px 0;
    font-size: 12.5px;
    color: var(--am);
}
.remocao-afastamento-info strong { color: var(--t); }

.memo {
    background: var(--sf);
    border-radius: var(--r14);
    border: 1px solid var(--bd);
    border-top: 3px solid var(--g);
    padding: 0;
    margin-bottom: 18px;
    overflow: hidden;
    box-shadow: var(--sh-sm);
}
.memo-t {
    font-size: 13px;
    font-weight: 700;
    color: var(--t);
    padding: 13px 20px 12px;
    border-bottom: 1px solid var(--bd);
    background: var(--sf);
    display: flex;
    align-items: center;
    gap: 9px;
}
.memo-t::before {
    content: '';
    width: 3px;
    height: 16px;
    background: var(--g);
    border-radius: 2px;
    flex-shrink: 0;
}
.ms {
    background: var(--sf);
    border-bottom: 1px solid var(--bd);
    padding: 14px 20px;
}
.ms:last-child { border-bottom: none; }
.ms-l {
    font-size: 9px;
    font-weight: 800;
    color: var(--g-d);
    text-transform: uppercase;
    letter-spacing: .13em;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 7px;
}
.ms-l::before {
    content: '';
    width: 6px;
    height: 6px;
    background: var(--g);
    border-radius: 50%;
    flex-shrink: 0;
}
.ms-t {
    font-size: 13px;
    color: var(--t2);
    margin-bottom: 4px;
    line-height: 1.65;
}
.ms-f {
    font-size: 13px;
    color: var(--t);
    line-height: 1.75;
    padding: 6px 12px;
    background: var(--sf2);
    border-radius: var(--r4);
    margin: 3px 0;
    border-left: 2.5px solid var(--g-pl);
}
.ms-n {
    font-size: 10.5px;
    color: var(--t3);
    margin-top: 5px;
    line-height: 1.6;
    font-style: italic;
}
.ms-ok { font-size: 15px; font-weight: 700; color: var(--ok); margin-top: 6px; }
.ms-err { font-size: 15px; font-weight: 700; color: var(--er); margin-top: 6px; }

.v-big {
    font-family: var(--ff);
    font-size: 22px;
    font-weight: 700;
    padding: 20px 28px;
    border-radius: var(--r);
    text-align: center;
    margin-top: 16px;
    letter-spacing: -0.01em;
    line-height: 1.2;
}
.v-cred { background: var(--ok-bg); color: var(--ok); border: 1px solid var(--ok-bd); }
.v-deb { background: var(--er-bg); color: var(--er); border: 1px solid var(--er-bd); }
.v-am { background: var(--am-bg); color: var(--am); border: 1px solid var(--am-bd); }

.tw { overflow-x: auto; }
table.dt {
    width: 100%;
    border-collapse: collapse;
    font-size: 12.5px;
}
table.dt th {
    padding: 9px 12px;
    font-size: 9.5px;
    color: var(--t3);
    font-weight: 700;
    border-bottom: 2px solid var(--bd);
    text-align: left;
    background: var(--sf2);
    text-transform: uppercase;
    letter-spacing: .1em;
    white-space: nowrap;
}
table.dt td {
    padding: 9px 12px;
    border-bottom: 1px solid var(--bd);
    color: var(--t);
    vertical-align: middle;
    font-weight: 500;
}
table.dt tr:last-child td { border-bottom: none; }
table.dt tbody tr:hover td { background: var(--g-pale); }

/* ── Print ── */
@media print {
    .no-print { display: none !important; }
    body { background: #fff; padding: 10px; }
    .app { gap: 8px; }
    .card, .norm, .memo { box-shadow: none; border-color: #ccc; }
    .btn { display: none; }
}

/* ── DatePicker Customizado ── */
.dp-wrap { position: relative; }
.dp-field {
    display: flex;
    align-items: center;
    border: 1.5px solid var(--bd2);
    border-radius: var(--r6);
    background: var(--sf);
    overflow: hidden;
    transition: border-color .14s, box-shadow .14s;
}
.dp-field:focus-within {
    border-color: var(--g);
    box-shadow: 0 0 0 3px rgba(191,140,20,.1);
}
.dp-field input[type="text"] {
    flex: 1;
    padding: 9px 13px;
    border: none !important;
    border-radius: 0 !important;
    font-size: 13px;
    font-family: var(--ff);
    font-weight: 500;
    color: var(--t);
    background: transparent;
    box-shadow: none !important;
    outline: none;
    min-width: 0;
}
.dp-field input[type="text"]:focus {
    border: none !important;
    box-shadow: none !important;
}
.dp-cal-btn {
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: none;
    border: none;
    border-left: 1.5px solid var(--bd2);
    cursor: pointer;
    color: var(--t3);
    flex-shrink: 0;
    transition: color .14s, background .14s;
}
.dp-cal-btn:hover { background: var(--g-pale); color: var(--g); }

.dp-popup {
    position: absolute;
    top: calc(100% + 6px);
    left: 0;
    z-index: 9999;
    background: var(--sf);
    border: 1.5px solid var(--bd2);
    border-radius: var(--r);
    box-shadow: 0 8px 32px rgba(10,28,48,.14), 0 2px 8px rgba(10,28,48,.08);
    padding: 12px;
    width: 248px;
    user-select: none;
}
.dp-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
}
.dp-nav {
    background: none;
    border: 1px solid var(--bd2);
    border-radius: var(--r6);
    width: 28px;
    height: 28px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--t2);
    font-size: 14px;
    transition: all .12s;
}
.dp-nav:hover { background: var(--g-pale); border-color: var(--g); color: var(--g); }
.dp-month-label {
    font-size: 13px;
    font-weight: 700;
    color: var(--t);
    cursor: pointer;
    padding: 4px 8px;
    border-radius: var(--r6);
    transition: background .12s;
}
.dp-month-label:hover { background: var(--g-pale); color: var(--g); }
.dp-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 2px;
}
.dp-dow {
    text-align: center;
    font-size: 9.5px;
    font-weight: 700;
    color: var(--t3);
    padding: 4px 0;
    text-transform: uppercase;
    letter-spacing: .06em;
}
.dp-day {
    text-align: center;
    padding: 5px 0;
    border-radius: 6px;
    font-size: 12.5px;
    font-weight: 500;
    color: var(--t);
    cursor: pointer;
    transition: all .1s;
    line-height: 1.2;
}
.dp-day:hover { background: var(--g-pale); color: var(--g); }
.dp-day.other { color: var(--t4); }
.dp-day.today { font-weight: 700; color: var(--g-d); }
.dp-day.selected {
    background: var(--g) !important;
    color: #fff !important;
    font-weight: 700;
}
.dp-day.empty { cursor: default; }
.dp-today-btn {
    margin-top: 10px;
    width: 100%;
    padding: 6px;
    background: var(--sf2);
    border: 1px solid var(--bd2);
    border-radius: var(--r6);
    font-size: 11px;
    font-weight: 600;
    color: var(--t2);
    cursor: pointer;
    font-family: var(--ff);
    transition: all .12s;
}
.dp-today-btn:hover { background: var(--g-pale); border-color: var(--g); color: var(--g); }
</style>
</head>
<body>

<div class="app" id="app">
    <!-- Cabeçalho -->
    <div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0 16px;border-bottom:2px solid var(--g)">
        <div>
            <div style="font-size:20px;font-weight:800;color:var(--n)">Cálculo Remoção <span style="font-weight:400;color:var(--t3)">·</span> <span style="font-weight:400;color:var(--t2)">SGP</span></div>
            <div style="font-size:11px;color:var(--t3)">Prazos de liberação e apresentação — Art. 36, Lei 8.112/90</div>
        </div>
        <div style="font-size:11px;color:var(--t4)">v3.2</div>
    </div>

    <!-- Conteúdo -->
    <div id="con"></div>

    <!-- Rodapé -->
    <div style="margin-top:30px;padding-top:12px;border-top:1px solid var(--bd);font-size:10px;color:var(--t4);text-align:center">
        Cálculo Remoção SGP — Sistema de Acertos Financeiros
    </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════════
// UTILITÁRIOS
// ═══════════════════════════════════════════════════════════════════

function e(s) { return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;"); }
function fd(iso) { if (!iso) return "—"; var p = iso.split("-"); return p.length === 3 ? p[2] + "/" + p[1] + "/" + p[0] : iso; }
function pd(iso) { if (!iso) return null; var p = iso.split("-"); return new Date(+p[0], +p[1] - 1, +p[2]); }
function R(v) { if (isNaN(v) || v == null) return "R$ —"; var a = Math.abs(v).toFixed(2).replace(".", ",").replace(/\B(?=(\d{3})+(?!\d))/g, "."); return (v < 0 ? "- " : "") + "R$ " + a; }
function svg(p, sz, c) { return '<svg width="' + (sz || 16) + '" height="' + (sz || 16) + '" viewBox="0 0 24 24" fill="none" stroke="' + (c || "currentColor") + '" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">' + p + '</svg>'; }

function showOk(msg) { UI.ok = true; UI.okMsg = msg; UI.err = false; render(); setTimeout(function() { UI.ok = false; render(); }, 3200); }
function showErr(msg) { UI.err = true; UI.errMsg = msg; UI.ok = false; render(); }

function applyTitleCase(el, stateRef) {
    var v = toTitleCase(el.value);
    el.value = v;
    if (stateRef) stateRef.nome = v;
}
function toTitleCase(str) {
    if (!str) return str;
    var particulas = ['da', 'de', 'do', 'das', 'dos', 'e', 'no', 'na', 'nos', 'nas', 'ao', 'aos', 'à', 'às', 'um', 'uma', 'uns', 'umas'];
    return str.trim().replace(/\s+/g, ' ').split(' ').map(function(w, i) {
        if (i > 0 && particulas.indexOf(w.toLowerCase()) !== -1) return w.toLowerCase();
        return w.charAt(0).toUpperCase() + w.slice(1).toLowerCase();
    }).join(' ');
}

function remNormalizeDate(d) {
    var result = new Date(d);
    result.setHours(0, 0, 0, 0);
    return result;
}

// ═══════════════════════════════════════════════════════════════════
// ESTADO
// ═══════════════════════════════════════════════════════════════════

var UI = {
    rem: {
        nome: "",
        siape: "",
        dataPublicacao: "",
        temAfastamento: false,
        dataInicioAfastamento: "",
        dataFimAfastamento: "",
        dataLiberacaoEfetiva: "",
        obs: "",
        res: null
    },
    ok: false,
    okMsg: "",
    err: false,
    errMsg: ""
};

// ═══════════════════════════════════════════════════════════════════
// CONSTANTES
// ═══════════════════════════════════════════════════════════════════

const REM_PRAZO_LIBERACAO = 10;
const REM_PRAZO_APRESENTACAO = 20;
const REM_COR_VERDE = 'verde';
const REM_COR_AMARELO = 'amarelo';
const REM_COR_VERMELHO = 'vermelho';
const REM_COR_AZUL = 'azul';
const REM_COR_ROXO = 'roxo';
const REM_STATUS_ICONS = {
    'verde': '✅',
    'amarelo': '⏳',
    'vermelho': '🔴',
    'azul': 'ℹ️',
    'roxo': '🟣'
};

// ═══════════════════════════════════════════════════════════════════
// CÁLCULO DO PRAZO MÁXIMO PARA LIBERAÇÃO
// ═══════════════════════════════════════════════════════════════════

function calcularPrazoMaximoLiberacao(dataPublicacao, temAfastamento, iniAfast, fimAfast) {
    var pub = pd(dataPublicacao);
    if (!pub) return null;

    // Prazo base: 10 dias da publicação (dia 1 = publicação)
    var prazoMax = new Date(pub);
    prazoMax.setDate(prazoMax.getDate() + (REM_PRAZO_LIBERACAO - 1));

    // Se tem afastamento, verifica se o afastamento começou ANTES da publicação
    if (temAfastamento && iniAfast && fimAfast) {
        var iniAf = pd(iniAfast);
        var fimAf = pd(fimAfast);
        
        if (iniAf && fimAf && fimAf >= iniAf) {
            // Caso 1: Afastamento começou ANTES da publicação
            // A contagem do prazo de liberação começa APÓS o fim do afastamento
            if (iniAf <= pub) {
                // O dia seguinte ao fim do afastamento é o Dia 1 da nova contagem
                var novoInicio = new Date(fimAf);
                novoInicio.setDate(novoInicio.getDate() + 1);
                
                // Prazo de 10 dias a partir do novo início
                prazoMax = new Date(novoInicio);
                prazoMax.setDate(prazoMax.getDate() + (REM_PRAZO_LIBERACAO - 1));
            } else {
                // Caso 2: Afastamento começou DEPOIS da publicação
                // Postergação normal (sobreposição com a janela do prazo)
                var iniAfNorm = remNormalizeDate(iniAf);
                var fimAfNorm = remNormalizeDate(fimAf);
                var inicioJanela = remNormalizeDate(pub);
                var fimJanela = remNormalizeDate(prazoMax);
                
                var inicioSobreposicao = new Date(Math.max(inicioJanela.getTime(), iniAfNorm.getTime()));
                var fimSobreposicao = new Date(Math.min(fimJanela.getTime(), fimAfNorm.getTime()));
                
                if (fimSobreposicao >= inicioSobreposicao) {
                    var diasPostergacao = Math.ceil((fimSobreposicao - inicioSobreposicao) / (1000 * 60 * 60 * 24)) + 1;
                    prazoMax.setDate(prazoMax.getDate() + diasPostergacao);
                }
            }
        }
    }

    return prazoMax;
}

// ═══════════════════════════════════════════════════════════════════
// CÁLCULO PRINCIPAL
// ═══════════════════════════════════════════════════════════════════

function remDiasUteisEntre(d1, d2) {
    if (!d1 || !d2 || d1 > d2) return 0;
    var count = 0;
    var current = new Date(d1);
    current.setHours(0, 0, 0, 0);
    var end = new Date(d2);
    end.setHours(0, 0, 0, 0);
    while (current <= end) {
        var dow = current.getDay();
        if (dow !== 0 && dow !== 6) count++;
        current.setDate(current.getDate() + 1);
    }
    return count;
}

function calcRemocao(dataPublicacao, temAfastamento, iniAfast, fimAfast, dataLiberacaoEfetiva) {
    if (!dataPublicacao) return null;

    var pub = pd(dataPublicacao);
    if (!pub) return null;

    var pubNorm = remNormalizeDate(pub);
    var iniContagem = new Date(pubNorm);

    // ── PASSO 1: Data de Liberação ──
    var dataLiberacaoBase = new Date(iniContagem);
    dataLiberacaoBase.setDate(dataLiberacaoBase.getDate() + (REM_PRAZO_LIBERACAO - 1));

    // ── PASSO 2: Verifica se afastamento começou ANTES da publicação ──
    var afastamentoAntesPublicacao = false;
    var dataLiberacaoAfastamento = null;
    
    if (temAfastamento && iniAfast && fimAfast) {
        var iniAf = pd(iniAfast);
        if (iniAf && iniAf <= pub) {
            afastamentoAntesPublicacao = true;
            var fimAf = pd(fimAfast);
            if (fimAf) {
                // O dia seguinte ao fim do afastamento é o novo marco zero
                var novoInicio = new Date(fimAf);
                novoInicio.setDate(novoInicio.getDate() + 1);
                dataLiberacaoBase = new Date(novoInicio);
                dataLiberacaoBase.setDate(dataLiberacaoBase.getDate() + (REM_PRAZO_LIBERACAO - 1));
                dataLiberacaoAfastamento = novoInicio;
            }
        }
    }

    // ── PASSO 3: Data de Apresentação ──
    var dataApresentacaoBase = new Date(dataLiberacaoBase);
    dataApresentacaoBase.setDate(dataApresentacaoBase.getDate() + (REM_PRAZO_APRESENTACAO - 1));

    // ── PASSO 4: Análise do afastamento (postergação normal) ──
    var afastamentoAtivo = false;
    var diasPostergacao = 0;
    var detalheAfastamento = null;
    var dataLiberacaoFinal = new Date(dataLiberacaoBase);
    var dataApresentacaoFinal = new Date(dataApresentacaoBase);

    if (temAfastamento && iniAfast && fimAfast && !afastamentoAntesPublicacao) {
        var iniAf = pd(iniAfast);
        var fimAf = pd(fimAfast);

        if (iniAf && fimAf && fimAf >= iniAf) {
            var iniAfNorm = remNormalizeDate(iniAf);
            var fimAfNorm = remNormalizeDate(fimAf);

            var inicioJanela = new Date(iniContagem);
            var fimJanela = new Date(dataLiberacaoBase);

            var inicioSobreposicao = new Date(Math.max(inicioJanela.getTime(), iniAfNorm.getTime()));
            var fimSobreposicao = new Date(Math.min(fimJanela.getTime(), fimAfNorm.getTime()));

            if (fimSobreposicao >= inicioSobreposicao) {
                afastamentoAtivo = true;
                diasPostergacao = Math.ceil((fimSobreposicao - inicioSobreposicao) / (1000 * 60 * 60 * 24)) + 1;

                dataLiberacaoFinal = new Date(dataLiberacaoBase);
                dataLiberacaoFinal.setDate(dataLiberacaoFinal.getDate() + diasPostergacao);

                dataApresentacaoFinal = new Date(dataLiberacaoFinal);
                dataApresentacaoFinal.setDate(dataApresentacaoFinal.getDate() + (REM_PRAZO_APRESENTACAO - 1));

                detalheAfastamento = {
                    periodo: fd(iniAfast) + ' a ' + fd(fimAfast),
                    diasPostergacao: diasPostergacao,
                    inicioSobreposicao: inicioSobreposicao.toISOString().slice(0, 10),
                    fimSobreposicao: fimSobreposicao.toISOString().slice(0, 10),
                    tipo: 'postergacao'
                };
            } else {
                detalheAfastamento = {
                    periodo: fd(iniAfast) + ' a ' + fd(fimAfast),
                    diasPostergacao: 0,
                    observacao: "O período de afastamento não se sobrepõe à janela do prazo de liberação, portanto não há postergação.",
                    tipo: 'sem_sobreposicao'
                };
            }
        }
    } else if (temAfastamento && iniAfast && fimAfast && afastamentoAntesPublicacao) {
        // Afastamento começou antes da publicação
        afastamentoAtivo = true;
        var fimAf = pd(fimAfast);
        detalheAfastamento = {
            periodo: fd(iniAfast) + ' a ' + fd(fimAfast),
            diasPostergacao: 0,
            observacao: "O afastamento já estava em curso antes da publicação. O prazo de liberação começou a contar a partir do dia seguinte ao fim do afastamento.",
            tipo: 'antes_publicacao',
            novoInicio: dataLiberacaoAfastamento ? fd(dataLiberacaoAfastamento.toISOString().slice(0, 10)) : null
        };
    }

    // ── PASSO 5: Verifica se foi informada uma data de efetiva liberação ──
    var temLiberacaoEfetiva = false;
    var dataLiberacaoEfetivaNorm = null;
    var diasAntecipacao = 0;
    var dataApresentacaoRecalculada = null;

    if (dataLiberacaoEfetiva) {
        var libEf = pd(dataLiberacaoEfetiva);
        if (libEf) {
            dataLiberacaoEfetivaNorm = remNormalizeDate(libEf);
            // Verifica se a data está dentro do prazo de 10 dias (considerando postergação)
            if (dataLiberacaoEfetivaNorm >= dataLiberacaoAfastamento || dataLiberacaoEfetivaNorm >= iniContagem) {
                var prazoMax = dataLiberacaoFinal;
                if (dataLiberacaoEfetivaNorm <= prazoMax) {
                    temLiberacaoEfetiva = true;
                    diasAntecipacao = Math.ceil((prazoMax - dataLiberacaoEfetivaNorm) / (1000 * 60 * 60 * 24));
                    dataApresentacaoRecalculada = new Date(dataLiberacaoEfetivaNorm);
                    dataApresentacaoRecalculada.setDate(dataApresentacaoRecalculada.getDate() + (REM_PRAZO_APRESENTACAO - 1));
                }
            }
        }
    }

    // ── PASSO 6: Aplica a data de efetiva liberação ──
    if (temLiberacaoEfetiva) {
        dataLiberacaoFinal = new Date(dataLiberacaoEfetivaNorm);
        dataApresentacaoFinal = new Date(dataApresentacaoRecalculada);
    }

    // ── PASSO 7: Dias corridos e úteis ──
    var referenciaInicio = (afastamentoAntesPublicacao && dataLiberacaoAfastamento) ? dataLiberacaoAfastamento : iniContagem;
    var diasCorridosLiberacao = Math.ceil((dataLiberacaoFinal - referenciaInicio) / (1000 * 60 * 60 * 24)) + 1;
    var diasCorridosApresentacao = Math.ceil((dataApresentacaoFinal - dataLiberacaoFinal) / (1000 * 60 * 60 * 24)) + 1;

    var diasUteisLiberacao = remDiasUteisEntre(referenciaInicio, dataLiberacaoFinal);
    var diasUteisApresentacao = remDiasUteisEntre(dataLiberacaoFinal, dataApresentacaoFinal);

    // ── PASSO 8: Status ──
    var hoje = remNormalizeDate(new Date());
    var status = {
        situacao: "AGUARDANDO",
        cor: REM_COR_AZUL,
        mensagem: "",
        diasRestantes: null,
        diasParaApresentar: null,
        diasAtraso: null
    };

    if (hoje < dataLiberacaoFinal) {
        var diasRestantes = Math.ceil((dataLiberacaoFinal - hoje) / (1000 * 60 * 60 * 24));
        status.situacao = "PRAZO DE LIBERAÇÃO EM CURSO";
        status.cor = REM_COR_AMARELO;
        status.mensagem = "Faltam " + diasRestantes + " dia(s) para a liberação.";
        status.diasRestantes = diasRestantes;
    } else if (hoje >= dataLiberacaoFinal && hoje <= dataApresentacaoFinal) {
        var diasParaApresentar = Math.ceil((dataApresentacaoFinal - hoje) / (1000 * 60 * 60 * 24));
        status.situacao = "LIBERADO — AGUARDANDO APRESENTAÇÃO";
        status.cor = REM_COR_VERDE;
        status.mensagem = "Servidor liberado. Prazo para apresentação: " + diasParaApresentar + " dia(s).";
        status.diasParaApresentar = diasParaApresentar;
    } else if (hoje > dataApresentacaoFinal) {
        var diasAtraso = Math.ceil((hoje - dataApresentacaoFinal) / (1000 * 60 * 60 * 24));
        status.situacao = "PRAZO DE APRESENTAÇÃO EXCEDIDO";
        status.cor = REM_COR_VERMELHO;
        status.mensagem = "Prazo de apresentação vencido há " + diasAtraso + " dia(s).";
        status.diasAtraso = diasAtraso;
    }

    if (temLiberacaoEfetiva) {
        status.cor = REM_COR_ROXO;
        status.situacao = "LIBERAÇÃO EFETIVADA";
        status.mensagem = "Servidor liberado em " + fd(dataLiberacaoEfetiva) + 
                         (diasAntecipacao > 0 ? " — " + diasAntecipacao + " dia(s) antes do prazo" : 
                          diasAntecipacao < 0 ? " — " + Math.abs(diasAntecipacao) + " dia(s) após o prazo" : 
                          " — exatamente no prazo");
    }

    return {
        dataPublicacao: dataPublicacao,
        dataLiberacao: dataLiberacaoFinal.toISOString().slice(0, 10),
        dataApresentacao: dataApresentacaoFinal.toISOString().slice(0, 10),
        dataLiberacaoOriginal: dataLiberacaoBase.toISOString().slice(0, 10),
        dataApresentacaoOriginal: dataApresentacaoBase.toISOString().slice(0, 10),
        diasCorridosLiberacao: diasCorridosLiberacao,
        diasCorridosApresentacao: diasCorridosApresentacao,
        diasUteisLiberacao: diasUteisLiberacao,
        diasUteisApresentacao: diasUteisApresentacao,
        temAfastamento: temAfastamento,
        afastamentoAtivo: afastamentoAtivo,
        afastamentoAntesPublicacao: afastamentoAntesPublicacao,
        diasPostergacao: diasPostergacao,
        detalheAfastamento: detalheAfastamento,
        temLiberacaoEfetiva: temLiberacaoEfetiva,
        dataLiberacaoEfetiva: temLiberacaoEfetiva ? dataLiberacaoEfetiva : null,
        diasAntecipacao: temLiberacaoEfetiva ? diasAntecipacao : 0,
        status: status,
        inicioContagem: (afastamentoAntesPublicacao && dataLiberacaoAfastamento) ? dataLiberacaoAfastamento.toISOString().slice(0, 10) : iniContagem.toISOString().slice(0, 10),
        referenciaInicio: referenciaInicio.toISOString().slice(0, 10),
    };
}

function doCalcRemocao() {
    var v = UI.rem;

    if (!v.nome.trim()) { showErr("Informe o nome do servidor."); return; }
    if (!v.dataPublicacao) { showErr("Informe a data da publicação da remoção."); return; }

    if (v.temAfastamento) {
        if (!v.dataInicioAfastamento || !v.dataFimAfastamento) {
            showErr("Informe o período do afastamento.");
            return;
        }
        if (v.dataFimAfastamento < v.dataInicioAfastamento) {
            showErr("A data de fim do afastamento é anterior à data de início.");
            return;
        }
    }

    // ── VALIDAÇÃO DA DATA DE EFETIVA LIBERAÇÃO ──
    if (v.dataLiberacaoEfetiva) {
        var libEf = pd(v.dataLiberacaoEfetiva);
        var pub = pd(v.dataPublicacao);
        
        if (libEf && pub && libEf < pub) {
            showErr("A data de efetiva liberação não pode ser anterior à data da publicação.");
            return;
        }

        // Calcula o prazo máximo de liberação considerando o afastamento
        var prazoMax = calcularPrazoMaximoLiberacao(
            v.dataPublicacao,
            v.temAfastamento,
            v.dataInicioAfastamento,
            v.dataFimAfastamento
        );

        if (prazoMax && libEf && libEf > prazoMax) {
            showErr("A data de efetiva liberação deve ser dentro do prazo de " + REM_PRAZO_LIBERACAO + " dias, considerando o afastamento (até " + fd(prazoMax.toISOString().slice(0,10)) + ").");
            return;
        }
    }

    var res = calcRemocao(
        v.dataPublicacao,
        v.temAfastamento,
        v.dataInicioAfastamento,
        v.dataFimAfastamento,
        v.dataLiberacaoEfetiva
    );

    if (!res) { showErr("Erro ao calcular. Verifique os dados informados."); return; }

    UI.rem.res = res;
    UI.err = false;
    render();

    setTimeout(function() {
        var memo = document.querySelector('.memo-remocao');
        if (memo) {
            var r = memo.getBoundingClientRect();
            window.scrollTo({ top: window.scrollY + r.top - 70, behavior: 'smooth' });
        }
    }, 120);
}

function renderResultado(res, v) {
    var h = '';

    h += '<div class="memo memo-remocao"><div class="memo-t">' + svg('', 14, "#BF8C14") + ' 📋 Memória de Cálculo</div>';

    // Parâmetros
    h += '<div class="ms"><div class="ms-l">Parâmetros</div>';
    h += '<div class="ms-t">Data da Publicação: <strong style="color:#BF8C14">' + fd(res.dataPublicacao) + '</strong></div>';
    
    if (res.afastamentoAntesPublicacao && res.detalheAfastamento && res.detalheAfastamento.novoInicio) {
        h += '<div class="ms-t" style="color:var(--am)">⚠ Afastamento já em curso antes da publicação: <strong>' + res.detalheAfastamento.periodo + '</strong></div>';
        h += '<div class="ms-t" style="color:var(--am)">Novo marco zero para liberação: <strong>' + res.detalheAfastamento.novoInicio + '</strong> (dia seguinte ao fim do afastamento)</div>';
    } else if (res.temAfastamento && res.afastamentoAtivo) {
        h += '<div class="ms-t" style="color:var(--am)">⚠ Afastamento com sobreposição: <strong>' + res.detalheAfastamento.periodo + '</strong></div>';
        h += '<div class="ms-t" style="color:var(--am)">Postergação da liberação: <strong>+' + res.diasPostergacao + ' dia(s)</strong></div>';
    }

    h += '<div class="ms-t">Prazo para liberação: <strong>' + REM_PRAZO_LIBERACAO + ' dias corridos</strong></div>';
    h += '<div class="ms-t">Prazo para apresentação: <strong>' + REM_PRAZO_APRESENTACAO + ' dias corridos</strong> contados da liberação</div>';
    
    if (res.temLiberacaoEfetiva) {
        h += '<div class="ms-t" style="color:#8B5CF6">🟣 Data de efetiva liberação: <strong>' + fd(res.dataLiberacaoEfetiva) + '</strong></div>';
        h += '<div class="ms-t" style="color:#8B5CF6">' + 
             (res.diasAntecipacao > 0 ? '✅ ' + res.diasAntecipacao + ' dia(s) antes do prazo' : 
              res.diasAntecipacao < 0 ? '⚠️ ' + Math.abs(res.diasAntecipacao) + ' dia(s) após o prazo' : 
              '✅ Exatamente no prazo') + '</div>';
    }

    h += '</div>';

    // Timeline
    h += '<div class="ms"><div class="ms-l">Linha do Tempo</div>';
    h += '<div class="remocao-timeline">';

    var eventos = [
        { data: res.inicioContagem, label: 'Marco Zero para Liberação', desc: 'Início da contagem do prazo de liberação', cor: REM_COR_AZUL },
        { data: res.dataLiberacao, label: 'Liberação do Servidor', desc: res.temLiberacaoEfetiva ? 'Data efetiva da liberação' : 'Dia ' + REM_PRAZO_LIBERACAO + ' — prazo para liberação', cor: res.temLiberacaoEfetiva ? REM_COR_ROXO : (res.afastamentoAtivo ? REM_COR_AMARELO : REM_COR_VERDE) },
        { data: res.dataApresentacao, label: 'Prazo Final para Apresentação', desc: 'Dia ' + REM_PRAZO_APRESENTACAO + ' contado da liberação — limite para apresentação', cor: REM_COR_VERMELHO }
    ];

    var hoje = remNormalizeDate(new Date());
    eventos.forEach(function(ev, idx) {
        var dt = pd(ev.data);
        var passado = dt && dt < hoje;
        var hojeFlag = dt && dt.getTime() === hoje.getTime();

        h += '<div class="evento">';
        h += '<div class="marcador ' + ev.cor + '" style="' + (passado && !hojeFlag ? 'opacity:0.5' : '') + '">' + (idx + 1) + '</div>';
        h += '<div class="conteudo">';
        h += '<div class="data">' + fd(ev.data) + (hojeFlag ? ' <span style="font-size:10px;font-weight:700;color:#3B82F6">← HOJE</span>' : '') + '</div>';
        h += '<div class="desc">' + ev.label + '</div>';
        h += '<div class="dias">' + ev.desc + '</div>';
        h += '</div>';
        h += '</div>';
    });

    h += '</div></div>';

    // Resumo
    h += '<div class="ms" style="border-color:rgba(191,140,20,.35)"><div class="ms-l">Resumo dos Prazos</div>';
    h += '<div class="remocao-resumo-grid">';

    var corLiberacao = res.temLiberacaoEfetiva ? REM_COR_ROXO : res.status.cor;
    h += '<div class="item">';
    h += '<div class="label">Liberação</div>';
    h += '<div class="valor ' + corLiberacao + '">' + fd(res.dataLiberacao) + '</div>';
    h += '<div style="font-size:11px;color:var(--t3);margin-top:4px">' + res.diasCorridosLiberacao + 'º dia da contagem</div>';
    if (res.diasUteisLiberacao > 0) {
        h += '<div style="font-size:10px;color:var(--t4)">~' + res.diasUteisLiberacao + ' dias úteis</div>';
    }
    if (res.temLiberacaoEfetiva) {
        h += '<div style="font-size:10px;color:#8B5CF6;margin-top:2px">🟣 Efetiva</div>';
    }
    h += '</div>';

    var corApresentacao = res.status.cor;
    h += '<div class="item">';
    h += '<div class="label">Apresentação</div>';
    h += '<div class="valor ' + corApresentacao + '">' + fd(res.dataApresentacao) + '</div>';
    h += '<div style="font-size:11px;color:var(--t3);margin-top:4px">' + res.diasCorridosApresentacao + 'º dia da liberação</div>';
    if (res.diasUteisApresentacao > 0) {
        h += '<div style="font-size:10px;color:var(--t4)">~' + res.diasUteisApresentacao + ' dias úteis</div>';
    }
    h += '</div>';

    var bgColor = res.status.cor === REM_COR_VERDE ? 'var(--ok-bg)' :
                  res.status.cor === REM_COR_AMARELO ? 'var(--am-bg)' :
                  res.status.cor === REM_COR_VERMELHO ? 'var(--er-bg)' :
                  res.status.cor === REM_COR_ROXO ? 'rgba(139,92,246,.12)' : 'var(--sf2)';
    var bdColor = res.status.cor === REM_COR_VERDE ? 'var(--ok-bd)' :
                  res.status.cor === REM_COR_AMARELO ? 'var(--am-bd)' :
                  res.status.cor === REM_COR_VERMELHO ? 'var(--er-bd)' :
                  res.status.cor === REM_COR_ROXO ? 'rgba(139,92,246,.3)' : 'var(--bd)';

    h += '<div class="item" style="background:' + bgColor + ';border-color:' + bdColor + '">';
    h += '<div class="label">Situação Atual</div>';
    h += '<div class="valor ' + res.status.cor + '" style="font-size:15px">' + REM_STATUS_ICONS[res.status.cor] + ' ' + res.status.situacao + '</div>';
    h += '<div style="font-size:11px;color:var(--t2);margin-top:4px">' + res.status.mensagem + '</div>';
    h += '</div>';

    h += '</div></div>';

    // Detalhe do afastamento
    if (res.temAfastamento && res.afastamentoAntesPublicacao && res.detalheAfastamento) {
        h += '<div class="ms" style="border-color:rgba(234,179,8,.35);background:var(--am-bg)">';
        h += '<div class="ms-l" style="color:var(--am)">⏳ Afastamento em Curso Antes da Publicação</div>';
        h += '<div class="ms-t">Período: <strong>' + res.detalheAfastamento.periodo + '</strong></div>';
        h += '<div class="ms-t">Novo marco zero para liberação: <strong>' + res.detalheAfastamento.novoInicio + '</strong></div>';
        h += '<div class="ms-t">Prazo de liberação (10 dias): <strong>' + fd(res.dataLiberacao) + '</strong></div>';
        h += '<div class="ms-n">O afastamento já estava em curso, portanto a contagem do prazo de liberação começou após o seu término.</div>';
        h += '</div>';
    } else if (res.temAfastamento && res.afastamentoAtivo) {
        h += '<div class="ms" style="border-color:rgba(234,179,8,.35);background:var(--am-bg)">';
        h += '<div class="ms-l" style="color:var(--am)">Afastamento em Vigência — Postergação da Liberação</div>';
        h += '<div class="ms-t">Período: <strong>' + res.detalheAfastamento.periodo + '</strong></div>';
        h += '<div class="ms-t">Período de sobreposição: <strong>' + fd(res.detalheAfastamento.inicioSobreposicao) + ' a ' + fd(res.detalheAfastamento.fimSobreposicao) + '</strong></div>';
        h += '<div class="ms-t">Dias de postergação: <strong style="color:var(--am)">+' + res.diasPostergacao + ' dias</strong></div>';
        h += '<div class="ms-n">Art. 36, § 2º, Lei 8.112/90 — O prazo de liberação fica prorrogado pelo período de afastamento que se sobreponha à janela do prazo</div>';
        h += '</div>';
    }

    // Detalhe da liberação efetiva
    if (res.temLiberacaoEfetiva) {
        h += '<div class="ms" style="border-color:rgba(139,92,246,.35);background:rgba(139,92,246,.06)">';
        h += '<div class="ms-l" style="color:#7C3AED">🟣 Liberação Efetiva Informada</div>';
        h += '<div class="ms-t">Data da efetiva liberação: <strong>' + fd(res.dataLiberacaoEfetiva) + '</strong></div>';
        h += '<div class="ms-t">' + (res.diasAntecipacao > 0 ? '✅ ' + res.diasAntecipacao + ' dia(s) antes do prazo' : 
                                   res.diasAntecipacao < 0 ? '⚠️ ' + Math.abs(res.diasAntecipacao) + ' dia(s) após o prazo' : 
                                   '✅ Exatamente no prazo') + '</div>';
        h += '<div class="ms-f" style="background:var(--sf2);border-left-color:rgba(139,92,246,.3)">';
        h += 'Nova data de apresentação calculada: <strong style="color:#7C3AED">' + fd(res.dataApresentacao) + '</strong> ';
        h += '(' + REM_PRAZO_APRESENTACAO + ' dias contados da data de efetiva liberação — o dia da liberação conta como Dia 1)';
        h += '</div>';
        h += '<div class="ms-n">Art. 36, Lei 8.112/90 — A contagem do prazo para apresentação inicia-se a partir da data da efetiva liberação</div>';
        h += '</div>';
    }

    h += '</div>'; // fecha memo

    // Tabela resumo
    h += '<div class="card"><div class="ch">Resumo para Documentação</div>';
    h += '<div class="tw"><table class="dt">';
    h += '<thead><tr><th>Evento</th><th>Data</th><th>Contagem</th><th>Dias Úteis (aprox.)</th></tr></thead>';
    h += '<tbody>';
    h += '<tr><td><strong>Publicação</strong></td><td>' + fd(res.dataPublicacao) + '</td><td>Marco inicial</td><td>—</td></tr>';
    if (res.afastamentoAntesPublicacao) {
        h += '<tr><td><strong>Fim do Afastamento</strong></td><td>' + fd(res.referenciaInicio) + '</td><td>Novo marco zero</td><td>—</td></tr>';
    }
    h += '<tr><td><strong>Liberação</strong></td><td>' + fd(res.dataLiberacao) + '</td><td>' + res.diasCorridosLiberacao + 'º dia da contagem</td><td>' + (res.diasUteisLiberacao > 0 ? res.diasUteisLiberacao + ' dias' : '—') + '</td></tr>';
    h += '<tr><td><strong>Apresentação</strong></td><td>' + fd(res.dataApresentacao) + '</td><td>' + res.diasCorridosApresentacao + 'º dia da liberação</td><td>' + (res.diasUteisApresentacao > 0 ? res.diasUteisApresentacao + ' dias' : '—') + '</td></tr>';
    if (res.temLiberacaoEfetiva) {
        h += '<tr style="background:rgba(139,92,246,.08)"><td colspan="4" style="font-size:11px;color:#7C3AED">🟣 Data de efetiva liberação: ' + fd(res.dataLiberacaoEfetiva) + ' — ' + 
             (res.diasAntecipacao > 0 ? res.diasAntecipacao + ' dia(s) antes do prazo' : 
              res.diasAntecipacao < 0 ? Math.abs(res.diasAntecipacao) + ' dia(s) após o prazo' : 
              'exatamente no prazo') + '</td></tr>';
    }
    if (res.temAfastamento && res.afastamentoAtivo) {
        h += '<tr style="background:var(--am-bg)"><td colspan="4" style="font-size:11px;color:var(--am)">⚠ Afastamento em vigor — liberação postergada em ' + res.diasPostergacao + ' dia(s)</td></tr>';
    }
    if (res.temAfastamento && res.afastamentoAntesPublicacao) {
        h += '<tr style="background:var(--am-bg)"><td colspan="4" style="font-size:11px;color:var(--am)">⏳ Afastamento já em curso — contagem iniciada após o término</td></tr>';
    }
    h += '</tbody></table></div>';

    if (v.obs && v.obs.trim()) {
        h += '<div style="margin-top:12px;padding:10px 14px;background:var(--sf2);border-radius:var(--r6);font-size:12px;color:var(--t2)">';
        h += '<strong>Observação:</strong> ' + e(v.obs);
        h += '</div>';
    }

    var corVBig = res.status.cor === REM_COR_VERMELHO ? 'v-deb' : 
                  res.status.cor === REM_COR_ROXO ? 'v-am' : 'v-cred';
    h += '<div class="v-big ' + corVBig + '" style="margin-top:12px">';
    h += REM_STATUS_ICONS[res.status.cor] + ' ' + res.status.situacao + ' — ' + res.status.mensagem;
    h += '</div>';
    h += '</div>';

    return h;
}

// ═══════════════════════════════════════════════════════════════════
// DATEPICKER CUSTOMIZADO
// ═══════════════════════════════════════════════════════════════════

var DP = {
    active: null // id do datepicker aberto
};

var DP_MESES = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho',
                'Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
var DP_DOWS = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];

// Estado de cada datepicker: { year, month } do calendário exibido
var DP_STATE = {};

function dpIsoToDisplay(iso) {
    if (!iso) return '';
    var p = iso.split('-');
    if (p.length !== 3) return iso;
    return p[2] + '/' + p[1] + '/' + p[0];
}

function dpDisplayToIso(display) {
    var clean = display.replace(/\D/g,'');
    if (clean.length !== 8) return '';
    var d = clean.slice(0,2), m = clean.slice(2,4), y = clean.slice(4,8);
    var di = +d, mi = +m, yi = +y;
    if (mi < 1 || mi > 12 || di < 1 || di > 31 || yi < 1900 || yi > 2099) return '';
    var testDate = new Date(yi, mi-1, di);
    if (testDate.getFullYear() !== yi || testDate.getMonth() !== mi-1 || testDate.getDate() !== di) return '';
    return y + '-' + m + '-' + d;
}

function dpMaskInput(el, id) {
    var raw = el.value.replace(/\D/g,'').slice(0,8);
    var out = '';
    if (raw.length > 0) out += raw.slice(0,2);
    if (raw.length > 2) out += '/' + raw.slice(2,4);
    if (raw.length > 4) out += '/' + raw.slice(4,8);
    el.value = out;

    // Se o usuário digitou 8 dígitos, tenta converter e sincronizar calendário
    if (raw.length === 8) {
        var iso = dpDisplayToIso(out);
        if (iso) {
            var p = iso.split('-');
            DP_STATE[id] = { year: +p[0], month: +p[1]-1 };
            // Atualiza o popup se estiver aberto
            if (DP.active === id) dpRenderPopup(id);
        }
    }
}

function dpOnTextChange(el, id, stateKey, rerender) {
    dpMaskInput(el, id);
    var iso = dpDisplayToIso(el.value);
    // Atualiza estado global mesmo com valor parcial (guarda vazio se inválido)
    setNestedState(stateKey, iso);
    if (iso && rerender) {
        UI.rem.res = null;
        render();
        // Reposiciona foco no campo de texto
        setTimeout(function() {
            var el2 = document.getElementById(id + '-txt');
            if (el2) { el2.focus(); el2.setSelectionRange(el2.value.length, el2.value.length); }
        }, 10);
    }
}

function setNestedState(key, val) {
    // key ex: 'rem.dataPublicacao'
    var parts = key.split('.');
    var obj = UI;
    for (var i = 0; i < parts.length - 1; i++) obj = obj[parts[i]];
    obj[parts[parts.length-1]] = val;
}

function dpOpenClose(id) {
    if (DP.active === id) {
        dpClose();
        return;
    }
    DP.active = id;
    // Inicializa estado do calendário baseado no valor atual ou hoje
    if (!DP_STATE[id]) {
        var today = new Date();
        DP_STATE[id] = { year: today.getFullYear(), month: today.getMonth() };
    }
    // Se já tem data digitada válida, mostra aquele mês
    var txtEl = document.getElementById(id + '-txt');
    if (txtEl) {
        var iso = dpDisplayToIso(txtEl.value);
        if (iso) {
            var p = iso.split('-');
            DP_STATE[id] = { year: +p[0], month: +p[1]-1 };
        }
    }
    dpRenderPopup(id);
}

function dpClose() {
    DP.active = null;
    var popups = document.querySelectorAll('.dp-popup');
    popups.forEach(function(p) { p.remove(); });
}

function dpRenderPopup(id) {
    // Remove popup anterior do mesmo id
    var old = document.getElementById(id + '-popup');
    if (old) old.remove();

    var state = DP_STATE[id];
    var year = state.year, month = state.month;

    // Data selecionada atual
    var txtEl = document.getElementById(id + '-txt');
    var selectedIso = txtEl ? dpDisplayToIso(txtEl.value) : '';

    var today = new Date();
    var todayY = today.getFullYear(), todayM = today.getMonth(), todayD = today.getDate();

    // Primeiro dia do mês e total de dias
    var firstDay = new Date(year, month, 1).getDay(); // 0=dom
    var daysInMonth = new Date(year, month+1, 0).getDate();
    var daysInPrev = new Date(year, month, 0).getDate();

    var h = '<div class="dp-popup" id="' + id + '-popup" onclick="event.stopPropagation()">';
    // Header
    h += '<div class="dp-header">';
    h += '<button class="dp-nav" onclick="dpNav(\'' + id + '\',-1)" title="Mês anterior">&#8249;</button>';
    h += '<span class="dp-month-label">' + DP_MESES[month] + ' ' + year + '</span>';
    h += '<button class="dp-nav" onclick="dpNav(\'' + id + '\',1)" title="Próximo mês">&#8250;</button>';
    h += '</div>';
    // Grid dias
    h += '<div class="dp-grid">';
    DP_DOWS.forEach(function(d) { h += '<div class="dp-dow">' + d + '</div>'; });
    // Dias do mês anterior
    for (var i = 0; i < firstDay; i++) {
        var pd2 = daysInPrev - firstDay + 1 + i;
        h += '<div class="dp-day other dp-empty">' + pd2 + '</div>';
    }
    // Dias do mês
    for (var d2 = 1; d2 <= daysInMonth; d2++) {
        var iso2 = year + '-' + String(month+1).padStart(2,'0') + '-' + String(d2).padStart(2,'0');
        var cls = 'dp-day';
        if (iso2 === selectedIso) cls += ' selected';
        else if (year === todayY && month === todayM && d2 === todayD) cls += ' today';
        h += '<div class="' + cls + '" onclick="dpSelectDay(\'' + id + '\',\'' + iso2 + '\')">' + d2 + '</div>';
    }
    // Completar última linha
    var totalCells = firstDay + daysInMonth;
    var remainder = totalCells % 7;
    if (remainder !== 0) {
        for (var nx = 1; nx <= 7 - remainder; nx++) {
            h += '<div class="dp-day other dp-empty">' + nx + '</div>';
        }
    }
    h += '</div>';
    // Botão hoje
    h += '<button class="dp-today-btn" onclick="dpSelectToday(\'' + id + '\')">📅 Hoje</button>';
    h += '</div>';

    var wrap = document.getElementById(id + '-wrap');
    if (wrap) wrap.insertAdjacentHTML('beforeend', h);
}

function dpNav(id, dir) {
    var s = DP_STATE[id];
    var m = s.month + dir;
    if (m > 11) { s.month = 0; s.year++; }
    else if (m < 0) { s.month = 11; s.year--; }
    else { s.month = m; }
    dpRenderPopup(id);
}

function dpSelectDay(id, iso) {
    // Atualiza o campo de texto
    var txtEl = document.getElementById(id + '-txt');
    if (txtEl) txtEl.value = dpIsoToDisplay(iso);

    // Atualiza estado
    var stateKey = document.getElementById(id + '-wrap').dataset.statekey;
    setNestedState(stateKey, iso);
    UI.rem.res = null;

    dpClose();
    render();
    // Reposiciona para o campo que foi alterado não piscar
    setTimeout(function() {
        var wrap = document.getElementById(id + '-wrap');
        if (wrap) wrap.scrollIntoView({ block: 'nearest' });
    }, 30);
}

function dpSelectToday(id) {
    var today = new Date();
    var iso = today.toISOString().slice(0,10);
    dpSelectDay(id, iso);
}

// Fecha popup ao clicar fora
document.addEventListener('click', function(ev) {
    if (DP.active && !ev.target.closest('.dp-wrap')) {
        dpClose();
    }
});

// Monta HTML do datepicker
function dpField(id, stateKey, currentIso, placeholder) {
    var displayVal = dpIsoToDisplay(currentIso || '');
    placeholder = placeholder || 'DD/MM/AAAA';
    return '<div class="dp-wrap" id="' + id + '-wrap" data-statekey="' + stateKey + '">' +
        '<div class="dp-field">' +
        '<input type="text" id="' + id + '-txt"' +
        ' value="' + displayVal + '"' +
        ' placeholder="' + placeholder + '"' +
        ' maxlength="10"' +
        ' inputmode="numeric"' +
        ' oninput="dpOnTextChange(this,\'' + id + '\',\'' + stateKey + '\',true)"' +
        ' onfocus="if(DP.active!==\'' + id + '\' && this.value.length===0){dpOpenClose(\'' + id + '\')}"' +
        '/>' +
        '<button class="dp-cal-btn" type="button" onclick="dpOpenClose(\'' + id + '\')" title="Abrir calendário">' +
        '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' +
        '<rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/>' +
        '<line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>' +
        '</svg>' +
        '</button>' +
        '</div>' +
        '</div>';
}

// ═══════════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════════

render();
</script>
